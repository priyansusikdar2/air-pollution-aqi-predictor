<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQI Predictor</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h1>🌍 Air Quality Predictor</h1>
    <p>Enter pollution values to predict AQI</p>

    <!-- ✅ FORM WRAPPER ADDED -->
    <form onsubmit="predictAQI(); return false;">
        <div class="form">
            <input type="number" id="pm25" placeholder="PM2.5" step="any" required>
            <input type="number" id="pm10" placeholder="PM10" step="any" required>
            <input type="number" id="no2" placeholder="NO2" step="any" required>
            <input type="number" id="so2" placeholder="SO2" step="any" required>
            <input type="number" id="co" placeholder="CO" step="any" required>

            <!-- ✅ BUTTON TYPE FIX -->
            <button type="submit">Predict AQI</button>
        </div>
    </form>

    <div id="resultBox" class="result hidden">
        <h2 id="aqiValue"></h2>
        <p id="aqiCategory"></p>
    </div>

    <p id="error"></p>
</div>

<script src="app.js"></script>

</body>
</html>
